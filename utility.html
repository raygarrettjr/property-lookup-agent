<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Utility Provider Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
      border-bottom: 3px solid #4CAF50;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #45a049;
    }

    #thinking {
      display: none;
      margin-top: 20px;
      font-style: italic;
      color: #555;
    }

    /* Navigation matching index.html */
    .nav {
      margin-bottom: 20px;
    }

    .nav a {
      margin-right: 20px;
      font-weight: bold;
      color: #4CAF50;
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    /* Utility cards */
    .card {
      background: white;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
    }

    .card b {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <div class="nav">
    <a href="index.html">Property Lookup</a>
    <a href="utility.html">Utility Finder</a>
  </div>

  <h1>Utility Provider Finder</h1>

  <label>Street Address</label>
  <input id="street" type="text" placeholder="123 Main Street">

  <label>City</label>
  <input id="city" type="text" placeholder="Raleigh">

  <label>State</label>
  <input id="state" type="text" placeholder="NC">

  <label>ZIP Code</label>
  <input id="zip" type="text" placeholder="27612">

  <button onclick="lookupUtilities()">Find Utilities</button>

  <div id="thinking">Thinking…</div>

  <div id="results"></div>

  <script>
    async function lookupUtilities() {
      const street = document.getElementById("street").value.trim();
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value.trim();
      const zip = document.getElementById("zip").value.trim();

      if (!street || !city || !state || !zip) {
        alert("Please fill out all fields.");
        return;
      }

      const payload = {
        street_address: street,
        city: city,
        state: state,
        zip: zip
      };

      document.getElementById("thinking").style.display = "block";
      document.getElementById("results").innerHTML = "";

      try {
        const response = await fetch(
          "https://fuseon.app.n8n.cloud/webhook/32e98d26-deb0-4cf1-b72d-dc96c8f973eb",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }
        );

        const data = await response.json();
        document.getElementById("thinking").style.display = "none";

        if (!Array.isArray(data)) {
          document.getElementById("results").innerHTML =
            "<p>Unexpected response format.</p>";
          return;
        }

        // Render stacked cards
        data.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <b>${item.utility_company_name}</b><br>
            <strong>Service:</strong> ${item.services_provided}<br>
            <strong>Phone:</strong> ${item.connection_phone}<br>
            <strong>Email:</strong> ${item.connection_email}<br>
            <strong>How to connect:</strong> ${item.how_to_connect}
          `;

          document.getElementById("results").appendChild(card);
        });

      } catch (err) {
        document.getElementById("thinking").style.display = "none";
        document.getElementById("results").innerHTML =
          "<p style='color:red;'>Error retrieving utility information.</p>";
      }
    }
  </script>

</body>
</html>
