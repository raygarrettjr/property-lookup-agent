<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Raleigh Property Lookup</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
      border-bottom: 3px solid #4CAF50;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #45a049;
    }

    #thinking {
      display: none;
      margin-top: 20px;
      font-style: italic;
      color: #555;
    }

    #results {
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <h1>Raleigh Property Lookup</h1>

  <label>Street Number</label>
  <input id="streetNumber" type="text" placeholder="e.g., 8924">

  <label>Street Name</label>
  <input id="streetName" type="text" placeholder="e.g., WOODSTONE DR">

  <button onclick="lookup()">Submit</button>

  <div id="thinking">Thinking…</div>

  <div id="results"></div>

  <script>
    async function lookup() {
      const number = document.getElementById("streetNumber").value.trim();
      const name = document.getElementById("streetName").value.trim();

      if (!number || !name) {
        alert("Please enter both street number and street name.");
        return;
      }

      document.getElementById("thinking").style.display = "block";
      document.getElementById("results").innerHTML = "";

      const response = await fetch(
        "https://n8n.yourserver.com/webhook/property-lookup", 
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ number, name })
        }
      );

      const data = await response.json();

      document.getElementById("thinking").style.display = "none";
      document.getElementById("results").innerHTML = data.html;
    }
  </script>

</body>
</html>
