<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Property Lookup Agent</title><style>body {font-family: Arial, sans-serif;max-width: 700px;margin: 40px auto;line-height: 1.5;}label {display: block;margin-top: 20px;font-weight: bold;}input {width: 100%;padding: 8px;margin-top: 5px;font-size: 16px;}.dropdown {border: 1px solid #ccc;max-height: 200px;overflow-y: auto;margin-top: 5px;}.dropdown-item {padding: 6px;cursor: pointer;border-bottom: 1px solid #eee;}.dropdown-item:hover {background: #f0f0f0;}#results {margin-top: 30px;}</style></head>
<body>
<h2>Raleigh Property Lookup</h2>
<label>Street Number</label> <input id="numInput" type="text" autocomplete="off">
<label>Street Name</label> <input id="streetInput" type="text" autocomplete="off">
<div id="autocomplete" class="dropdown"></div>
<div id="results"></div>
<script>let addresses = [];// Load addresses.jsonfetch('addresses.json').then(res => res.json()).then(data => addresses = data);const numInput = document.getElementById('numInput');const streetInput = document.getElementById('streetInput');const dropdown = document.getElementById('autocomplete');const results = document.getElementById('results');function filterAddresses() {const num = numInput.value.trim();const street = streetInput.value.trim().toUpperCase();if (!num && !street) {dropdown.innerHTML = '';return;}const matches = addresses.filter(a =>a.number.toString().startsWith(num) &&a.street.includes(street)).slice(0, 20);renderDropdown(matches);}function renderDropdown(list) {dropdown.innerHTML = '';list.forEach(item => {const div = document.createElement('div');div.className = 'dropdown-item';div.textContent = item.address;div.onclick = () => selectAddress(item);dropdown.appendChild(div);});}function selectAddress(item) {dropdown.innerHTML = '';numInput.value = item.number;streetInput.value = item.street;// Send PIN to n8n webhookfetch('https://fuseon.app.n8n.cloud/webhook/b84479dc-4f45-4c63-90d1-dc5c21df9d32', {method: 'POST',headers: { 'Content-Type': 'application/json' },body: JSON.stringify({ pin: item.pin })}).then(res => res.text()).then(html => results.innerHTML = html).catch(err => {results.innerHTML = "<p style='color:red;'>Error contacting lookup service.</p>";});}numInput.addEventListener('input', filterAddresses);streetInput.addEventListener('input', filterAddresses);</script>
</body></html>
