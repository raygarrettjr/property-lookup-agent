<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raleigh Property Lookup</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
      border-bottom: 3px solid #4CAF50;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #45a049;
    }

    #thinking {
      display: none;
      margin-top: 20px;
      font-style: italic;
      color: #555;
    }

    #results {
      margin-top: 40px;
    }

    /* Autocomplete dropdown */
    .dropdown {
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 5px;
      background: white;
      display: none;
      position: relative;
      z-index: 10;
    }

    .dropdown-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .dropdown-item:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <div class="nav">
    <a href="index.html">Property Lookup</a>
    <a href="utility.html">Utility Finder</a>
  </div>

  <h1>Raleigh Property Lookup</h1>

  <label>Street Number</label>
  <input id="numInput" type="text" autocomplete="off">

  <label>Street Name</label>
  <input id="streetInput" type="text" autocomplete="off">

  <div id="autocomplete" class="dropdown"></div>

  <button onclick="manualSubmit()">Submit</button>

  <div id="thinking">Thinking…</div>

  <div id="results"></div>

  <script>
    let addresses = [];

    // Load addresses.json
    fetch('addresses.json')
      .then(res => res.json())
      .then(data => addresses = data);

    const numInput = document.getElementById('numInput');
    const streetInput = document.getElementById('streetInput');
    const dropdown = document.getElementById('autocomplete');
    const results = document.getElementById('results');
    const thinking = document.getElementById('thinking');

    function filterAddresses() {
      const num = numInput.value.trim();
      const street = streetInput.value.trim().toUpperCase();

      if (!num && !street) {
        dropdown.style.display = 'none';
        dropdown.innerHTML = '';
        return;
      }

      const matches = addresses
        .filter(a =>
          a.number.toString().startsWith(num) &&
          a.street.includes(street)
        )
        .slice(0, 20);

      renderDropdown(matches);
    }

    function renderDropdown(list) {
      dropdown.innerHTML = '';

      if (list.length === 0) {
        dropdown.style.display = 'none';
        return;
      }

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.textContent = item.address;
        div.onclick = () => selectAddress(item);
        dropdown.appendChild(div);
      });

      dropdown.style.display = 'block';
    }

    function selectAddress(item) {
      dropdown.innerHTML = '';
      dropdown.style.display = 'none';

      numInput.value = item.number;
      streetInput.value = item.street;

      submitToWebhook(item.pin);
    }

    function manualSubmit() {
      const num = numInput.value.trim();
      const street = streetInput.value.trim().toUpperCase();

      const match = addresses.find(
        a => a.number.toString() === num && a.street === street
      );

      if (!match) {
        alert("Address not found. Please select from the dropdown.");
        return;
      }

      submitToWebhook(match.pin);
    }

    function submitToWebhook(pin) {
      thinking.style.display = "block";
      results.innerHTML = "";

      fetch('https://fuseon.app.n8n.cloud/webhook/b84479dc-4f45-4c63-90d1-dc5c21df9d32', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      })
      .then(res => res.text())
      .then(html => {
        thinking.style.display = "none";
        results.innerHTML = html;
      })
      .catch(err => {
        thinking.style.display = "none";
        results.innerHTML = "<p style='color:red;'>Error contacting lookup service.</p>";
      });
    }

    numInput.addEventListener('input', filterAddresses);
    streetInput.addEventListener('input', filterAddresses);
  </script>

</body>
</html>
